# CPCBF Inventory — Arduino MKR WiFi 1010 pair via RPi serial bridges
# Update bridge RPi IPs and serial ports for your setup.

hosts:
  mkr_a:
    hostname: 192.168.8.30       # Bridge RPi A IP
    username: pi
    password: raspberry
    transport: serial_bridge
    serial_port: /dev/ttyACM_WIFI
    serial_baud: 115200
    board_type: mkr_wifi_1010
    ble_mac: "84:0d:8e:33:8e:8e"
    flasher_path: /home/pi/common-bench/cpcbf/field/firmware_flash.py
    firmware_dir: /home/pi/common-bench/cpcbf/field/firmware

  mkr_b:
    hostname: 192.168.8.31       # Bridge RPi B IP
    username: pi
    password: raspberry
    transport: serial_bridge
    serial_port: /dev/ttyACM_WIFI
    serial_baud: 115200
    board_type: mkr_wifi_1010
    ble_mac: "84:0d:8e:34:e1:06"
    flasher_path: /home/pi/common-bench/cpcbf/field/firmware_flash.py
    firmware_dir: /home/pi/common-bench/cpcbf/field/firmware
