global:
  repetitions: 100
  warmup: 5
  timeout_ms: 2000
  inter_packet_us: 100000   # 100ms between samples → 10s test
  port: 128             # L2CAP PSM
  channel: 0
  topology: ble_l2cap
  cooldown_s: 10

tests:
  - name: ble_rpi4_rssi
    mode: rssi
    protocol: ble
    board: rpi4
    payload_sizes: [0]       # not used for RSSI, but required by schema
