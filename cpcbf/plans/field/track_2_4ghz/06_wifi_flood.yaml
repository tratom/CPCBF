firmware: mkrwifi1010_wifi_flood

global:
  warmup: 10
  timeout_ms: 1000
  port: 5201
  channel: 1
  topology: softap
  essid: CPCBF_MKR
  cooldown_s: 15

tests:
  - name: wifi_mkr1010_flood
    mode: flood
    protocol: wifi
    board: mkr_wifi_1010
    repetitions: 8000
    inter_packet_us: 25000
    payload_sizes: [1432]

# throughput test with 25 ms pacing to get max throughput (aggregate-only with chunks on MKR) without overwhelming the receiver's buffer and causing drops
# 1432B payload + 14B bench header = 1446B, WiFiNINA max UDP payload