global:
  repetitions: 1500
  warmup: 10
  timeout_ms: 5000
  inter_packet_us: 0
  port: 128             # L2CAP PSM
  channel: 0
  topology: ble_l2cap
  cooldown_s: 15
  ble_phy: "2m"

tests:
  - name: ble_rpi4_flood_2m
    mode: flood
    protocol: ble
    board: rpi4
    payload_sizes: [20, 100, 231, 1458]

# Same as ble_rpi4_flood.yaml but uses BLE 5.0 2M PHY for ~2x throughput.
# The RPi4's BCM43455 supports 2M PHY.
