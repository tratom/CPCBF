global:
  warmup: 10
  timeout_ms: 2000
  port: 5201
  channel: 2437
  topology: p2p
  cooldown_s: 15

tests:

# RSSI test with 100ms pacing to get stable RSSI readings without queueing effects
  - name: wifi_rpi4_rssi
    mode: rssi
    protocol: wifi
    board: rpi4
    repetitions: 100
    inter_packet_us: 100000   # 100ms between samples → 10s test
    payload_sizes: [0]        # not used for RSSI, but required by schema

# latency test with 1s pacing to avoid queueing and get clean RTT measurements
  - name: wifi_rpi4_rtt
    mode: ping_pong
    protocol: wifi
    board: rpi4
    repetitions: 300
    inter_packet_us: 0
    payload_sizes: [32]

# throughput test with no pacing to get max throughput and observe queueing effects at the receiver
  - name: wifi_rpi4_flood
    mode: flood
    protocol: wifi
    board: rpi4
    repetitions: 2100000
    inter_packet_us: 0
    payload_sizes: [1458]

# 1472 is the max payload size for UDP over Ethernet (1500 - 20 IP header - 8 UDP header)
# However, due to the 14 byte bench packet header, the max payload size for UDP over Wi-Fi
# is 1500 - 20 IP header - 8 UDP header - 14 bench header = 1458 bytes

# total number of packets: 110 (RSSI) + 310 (RTT) + 2100000 (flood) = 2100420 packets
# total exec time ~5 minutes (110 packets × 100ms pacing + 300 packets × 0s pacing + 2100000 packets × 0ms pacing + receiver drain)

# 15 s * 3 for cooldown + 37 s * 3 reconnection time = 156 s ~ 2.5 minutes

# total exec time with cooldowns and reconnections: ~8 minutes