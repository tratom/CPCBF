global:
  repetitions: 1000
  warmup: 10
  timeout_ms: 2000
  inter_packet_us: 0
  port: 5201
  channel: 2437
  topology: p2p
  cooldown_s: 10

tests:
  - name: wifi_rpi4_flood
    mode: flood
    protocol: wifi
    board: rpi4
    payload_sizes: [32, 128, 512, 1458]

#total exec time ~2 minutes (1010 packets × 1ms pacing + receiver drain)

#1472 is the max payload size for UDP over Ethernet (1500 - 20 IP header - 8 UDP header)
#However, due to the 14 byte bench packet header, the max payload size for UDP over Wi-Fi is 1500 - 20 IP header - 8 UDP header - 14 bench header = 1458 bytes