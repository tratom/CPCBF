global:
  warmup: 10
  timeout_ms: 2000
  port: 5201
  channel: 2437
  topology: p2p
  cooldown_s: 10

tests:

# RSSI test with 100ms pacing to get stable RSSI readings without queueing effects
  - name: wifi_rpi4_rssi
    mode: rssi
    protocol: wifi
    board: rpi4
    repetitions: 100
    inter_packet_us: 100000   # 100ms between samples → 10s test
    payload_sizes: [0]        # not used for RSSI, but required by schema

# latency test with 1s pacing to avoid queueing and get clean RTT measurements
  - name: wifi_rpi4_rtt
    mode: ping_pong
    protocol: wifi
    board: rpi4
    repetitions: 300
    inter_packet_us: 1000000  # 1s between samples → 5min test (300 packets × 1s pacing + receiver drain)
    payload_sizes: [32]

# throughput test with no pacing to get max throughput and observe queueing effects at the receiver
  - name: wifi_rpi4_flood
    mode: flood
    protocol: wifi
    board: rpi4
    repetitions: 2000
    inter_packet_us: 0
    payload_sizes: [1458]

# 1472 is the max payload size for UDP over Ethernet (1500 - 20 IP header - 8 UDP header)
# However, due to the 14 byte bench packet header, the max payload size for UDP over Wi-Fi
# is 1500 - 20 IP header - 8 UDP header - 14 bench header = 1458 bytes

#total exec time ~2 minutes (1010 packets × 0ms pacing + receiver drain)

# total number of packets: 110 (RSSI) + 310 (RTT) + 2010 (flood) = 2430 packets
# total exec time ~7 minutes (110 packets × 100ms pacing + 300 packets × 1s pacing + 2010 packets × 0ms pacing + receiver drain)
