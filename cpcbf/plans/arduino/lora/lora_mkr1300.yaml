# Combined LoRa plan — flash the matching per-mode firmware before running
# each test block (the runtime build can't mix modes because CPCBF_STATIC_
# RESULTS_MAX differs per env). No top-level `firmware:` field so the user
# chooses which env to flash.

global:
  warmup: 10
  timeout_ms: 5000
  cooldown_s: 15

tests:

# RSSI — 1 s pacing, 32 B payload → 100 reps ≈ 100 s wall, 7 s TX
  - name: lora_mkr1300_rssi
    mode: rssi
    protocol: lora
    board: mkr_wan_1300
    repetitions: 100
    inter_packet_us: 1000000
    payload_sizes: [32]

# RTT — 2 s pacing, 32 B payload → 100 reps ≈ 200 s wall, 20 s TX per side
  - name: lora_mkr1300_rtt
    mode: ping_pong
    protocol: lora
    board: mkr_wan_1300
    repetitions: 100
    inter_packet_us: 2000000
    payload_sizes: [32]

# Flood — back-to-back at 200 B payload. 60 reps stays under the 1 %
# EU868 duty-cycle limit at +14 dBm (60 × 370 ms ≈ 22 s < 36 s/hr).
  - name: lora_mkr1300_flood
    mode: flood
    protocol: lora
    board: mkr_wan_1300
    repetitions: 60
    inter_packet_us: 0
    payload_sizes: [200]
    timeout_ms: 10000
