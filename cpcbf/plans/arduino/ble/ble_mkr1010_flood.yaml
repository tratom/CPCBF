firmware: mkrwifi1010_ble_flood

# Flood runs as synchronous ping-pong on BLE — ArduinoBLE GATT has no
# L2CAP flow control, so the firmware translates mode=flood → ping_pong
# internally (see main.cpp). repetitions = one-way budget / 2 (each
# round-trip puts 2 packets on the air).

global:
  warmup: 10
  timeout_ms: 5000
  port: 0
  channel: 0
  topology: ble_gatt
  cooldown_s: 15

tests:
  - name: ble_mkr1010_flood
    mode: flood
    protocol: ble
    board: mkr_wifi_1010
    repetitions: 2425
    inter_packet_us: 0
    payload_sizes: [230]
