global:
  warmup: 10
  timeout_ms: 5000
  port: 0
  channel: 0
  topology: ble_gatt
  cooldown_s: 15

tests:
  - name: ble_mkr1010_rssi
    mode: rssi
    protocol: ble
    board: mkr_wifi_1010
    repetitions: 100
    inter_packet_us: 100000     # 100ms → 10s
    payload_sizes: [0]

  - name: ble_mkr1010_rtt
    mode: ping_pong
    protocol: ble
    board: mkr_wifi_1010
    repetitions: 100
    inter_packet_us: 1000000    # 1s → 5min
    payload_sizes: [32]

  - name: ble_mkr1010_flood
    mode: flood
    protocol: ble
    board: mkr_wifi_1010
    repetitions: 2000 #30000          # conservative start, tune after first run
    inter_packet_us: 0
    payload_sizes: [230]        # max: 244 ATT - 14 bench overhead
