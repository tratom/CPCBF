; CPCBF Agent — Arduino MKR WiFi 1010
; Two environments: WiFi-only and BLE-only (separate firmwares)

[env]
platform = atmelsam
board = mkrwifi1010
framework = arduino
lib_extra_dirs = lib
monitor_speed = 115200
build_flags =
    -DARDUINO_PLATFORM
    -DMAX_RESULTS=500

[env:mkrwifi1010_wifi]
lib_deps =
    bblanchon/ArduinoJson@^7
    arduino-libraries/WiFiNINA@^2.0
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_WIFI
    -DBENCH_MAX_PAYLOAD=1432
build_src_filter = +<*> -<ble_adapter_nina.cpp>

[env:mkrwifi1010_ble]
lib_deps =
    bblanchon/ArduinoJson@^7
    arduino-libraries/ArduinoBLE@^2.0
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_BLE
    -DBENCH_MAX_PAYLOAD=230
build_src_filter = +<*> -<wifi_adapter_nina.cpp>
