; CPCBF Agent — Arduino MKR WiFi 1010
; Six environments: one per protocol × test-mode (separate firmwares).
; Splitting the binary keeps each build's BSS within the SAMD21's 32 KB SRAM
; by compiling only the mode-specific buffers/code paths.

[env]
platform = atmelsam
board = mkrwifi1010
framework = arduino
lib_extra_dirs = lib
monitor_speed = 115200
build_flags =
    -DARDUINO_PLATFORM
    -DMAX_RESULTS=500

; ---------------- WiFi firmwares ----------------

[wifi_base]
lib_deps =
    bblanchon/ArduinoJson@^7
    arduino-libraries/WiFiNINA@^2.0
build_src_filter = +<*> -<ble_adapter_nina.cpp>

[env:mkrwifi1010_wifi_rssi]
lib_deps = ${wifi_base.lib_deps}
build_src_filter = ${wifi_base.build_src_filter}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_WIFI
    -DCPCBF_TEST_MODE_RSSI
    -DBENCH_MAX_PAYLOAD=1432
    -DCPCBF_STATIC_RESULTS_MAX=110

[env:mkrwifi1010_wifi_rtt]
lib_deps = ${wifi_base.lib_deps}
build_src_filter = ${wifi_base.build_src_filter}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_WIFI
    -DCPCBF_TEST_MODE_RTT
    -DBENCH_MAX_PAYLOAD=1432
    -DCPCBF_STATIC_RESULTS_MAX=320

[env:mkrwifi1010_wifi_flood]
lib_deps = ${wifi_base.lib_deps}
build_src_filter = ${wifi_base.build_src_filter}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_WIFI
    -DCPCBF_TEST_MODE_FLOOD
    -DBENCH_MAX_PAYLOAD=1432
    -DCPCBF_STATIC_RESULTS_MAX=8

; ---------------- BLE firmwares ----------------

[ble_base]
lib_deps =
    bblanchon/ArduinoJson@^7
    arduino-libraries/ArduinoBLE@^2.0
build_src_filter = +<*> -<wifi_adapter_nina.cpp>

[env:mkrwifi1010_ble_rssi]
lib_deps = ${ble_base.lib_deps}
build_src_filter = ${ble_base.build_src_filter}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_BLE
    -DCPCBF_TEST_MODE_RSSI
    -DBENCH_MAX_PAYLOAD=230
    -DCPCBF_STATIC_RESULTS_MAX=110
    -DBLE_RX_POOL_BYTES=0
    -DBLE_RX_RING_SLOTS=4

[env:mkrwifi1010_ble_rtt]
lib_deps = ${ble_base.lib_deps}
build_src_filter = ${ble_base.build_src_filter}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_BLE
    -DCPCBF_TEST_MODE_RTT
    -DBENCH_MAX_PAYLOAD=230
    -DCPCBF_STATIC_RESULTS_MAX=320
    -DBLE_RX_POOL_BYTES=0
    -DBLE_RX_RING_SLOTS=16

; NOTE: BLE flood runs as ping-pong at compile time (see main.cpp handle_configure).
; CPCBF_TEST_MODE_FLOOD is intentionally NOT set so test_engine.c compiles in the
; ping-pong path. The NINA GATT queue has no L2CAP flow control, so synchronous
; round-trip is the only reliable way to saturate the air interface.
[env:mkrwifi1010_ble_flood]
lib_deps = ${ble_base.lib_deps}
build_src_filter = ${ble_base.build_src_filter}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_BLE
    -DCPCBF_TEST_MODE_RTT
    -DBENCH_MAX_PAYLOAD=230
    -DCPCBF_STATIC_RESULTS_MAX=8
    -DBLE_RX_POOL_BYTES=0
    -DBLE_RX_RING_SLOTS=16
