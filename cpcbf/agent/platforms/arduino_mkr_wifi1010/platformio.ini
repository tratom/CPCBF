; CPCBF Agent — Arduino MKR WiFi 1010
[env:mkrwifi1010]
platform = atmelsam
board = mkrwifi1010
framework = arduino

lib_deps =
    bblanchon/ArduinoJson@^7
    arduino-libraries/WiFiNINA@^1.8

build_flags =
    -DBENCH_MAX_PAYLOAD=512
    -DARDUINO_PLATFORM
    -DMAX_RESULTS=110

; Link common CPCBF C sources from lib/cpcbf_common/
lib_extra_dirs = lib

monitor_speed = 115200
