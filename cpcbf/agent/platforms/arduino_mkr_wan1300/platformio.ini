; CPCBF Agent — Arduino MKR WAN 1300 (LoRa P2P)
; Three environments: one per test mode (rssi/rtt/flood).
; Splits keep BSS within the SAMD21's 32 KB SRAM by compiling only
; the mode-specific result buffers.
;
; LoRa library: Sandeep Mistry's arduino-libraries/LoRa (raw SX1276 P2P).
; NOT MKRWAN (that one is LoRaWAN-only and needs a gateway).

[env]
platform = atmelsam
board = mkrwan1300
framework = arduino
lib_extra_dirs = lib
monitor_speed = 115200
build_flags =
    -DARDUINO_PLATFORM
    -DMAX_RESULTS=500

[lora_base]
lib_deps =
    bblanchon/ArduinoJson@^7
    sandeepmistry/LoRa@^0.8

; ---------------- LoRa firmwares ----------------

[env:mkrwan1300_lora_rssi]
lib_deps = ${lora_base.lib_deps}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_LORA
    -DCPCBF_TEST_MODE_RSSI
    -DBENCH_MAX_PAYLOAD=200
    -DCPCBF_STATIC_RESULTS_MAX=110

[env:mkrwan1300_lora_rtt]
lib_deps = ${lora_base.lib_deps}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_LORA
    -DCPCBF_TEST_MODE_RTT
    -DBENCH_MAX_PAYLOAD=200
    -DCPCBF_STATIC_RESULTS_MAX=320

[env:mkrwan1300_lora_flood]
lib_deps = ${lora_base.lib_deps}
build_flags =
    ${env.build_flags}
    -DCPCBF_PROTOCOL_LORA
    -DCPCBF_TEST_MODE_FLOOD
    -DBENCH_MAX_PAYLOAD=200
    -DCPCBF_STATIC_RESULTS_MAX=8
